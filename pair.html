<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>THE PAIN MD • PAIR</title>

<style>
body{
  background:black;
  color:#ff0000;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* MATRIX RAIN */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  width:95%;
  max-width:600px;
  text-align:center;
}

/* TITRE */
h1{
  font-size:45px;
  margin-bottom:10px;
  animation:glitch 1s infinite;
}

/* INPUT */
input{
  width:100%;
  padding:22px;
  font-size:20px;
  margin:20px 0;
  background:black;
  border:2px solid red;
  color:red;
}

/* BOUTON */
button{
  width:100%;
  padding:22px;
  font-size:20px;
  background:black;
  border:2px solid red;
  color:red;
  cursor:pointer;
}

/* RESULT */
#result{
  margin-top:20px;
  font-size:22px;
}

/* GLITCH */
@keyframes glitch{
  0%{text-shadow:2px 0 red;}
  50%{text-shadow:-2px 0 red;}
  100%{text-shadow:2px 0 red;}
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div class="container">
  <h1>☠️ THE PAIN MD ☠️</h1>

  <p>Entrer votre numéro WhatsApp (format international)</p>

  <input id="number" placeholder="+243XXXXXXXXX">

  <button onclick="gen()">GENERATE PAIR CODE</button>

  <div id="result"></div>

  <p>POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸</p>
</div>

<script>
async function gen(){
  let num = document.getElementById("number").value;
  let res = await fetch("/code?number="+num);
  let data = await res.json();
  document.getElementById("result").innerHTML = data.code || "ERROR";
}

/* MATRIX RAIN */
let canvas = document.getElementById("rain");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "THEPAIN☠️123456789@#$%^&*";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#ff0000";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(draw,33);
</script>

</body>
</html>
