<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PAIN MD - PAIR</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  box-sizing: border-box;
  font-family: monospace;
}

body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  color: red;
  overflow: hidden;
}

/* GLITCH BACKGROUND */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,0,0,0.05),
    rgba(255,0,0,0.05) 1px,
    transparent 1px,
    transparent 2px
  );
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  50% { transform: translate(2px,-2px); }
  100% { transform: translate(0); }
}

/* TERMINAL BOX */
.card {
  position: relative;
  width: 92%;
  max-width: 420px;
  background: rgba(10,0,0,0.9);
  border: 1px solid red;
  padding: 25px;
  box-shadow: 0 0 30px red;
  z-index: 2;
}

/* TITLE */
.card h2 {
  text-align: center;
  color: red;
  text-shadow: 0 0 15px red;
  letter-spacing: 2px;
}

/* INPUT */
.input-box {
  display: flex;
  align-items: center;
  border: 1px solid red;
  padding: 12px;
  margin-top: 15px;
}

.input-box input {
  background: transparent;
  border: none;
  color: red;
  width: 100%;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: 1px solid red;
  background: black;
  color: red;
  cursor: pointer;
}

button:hover {
  background: red;
  color: black;
}

/* TERMINAL TEXT */
#pair {
  margin-top: 20px;
  font-size: 14px;
  min-height: 40px;
}

/* LOADER TEXT */
.loader-text {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* COPY */
.copy-btn {
  margin-top: 10px;
  padding: 8px;
  border: 1px solid red;
  background: black;
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>☠ THE PAIN MD ☠</h2>

<p style="text-align:center;color:#aaa;">
ENTER NUMBER • INITIALIZE SESSION
</p>

<div class="input-box">
<input type="number" id="number" placeholder="+243XXXXXXXXX">
</div>

<button id="submit">
⟦ GENERATE SESSION ⟧
</button>

<main id="pair"></main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
let a = document.getElementById("pair");
let b = document.getElementById("submit");
let c = document.getElementById("number");

async function Copy() {
  let codeEl = document.getElementById("copy");
  await navigator.clipboard.writeText(codeEl.dataset.code);
  alert("COPIED");
}

b.addEventListener("click", async (e) => {
  e.preventDefault();

  if (!c.value || c.value.replace(/[^0-9]/g, "").length < 11) {
    a.innerHTML = "❌ INVALID NUMBER";
    return;
  }

  const bc = c.value.replace(/[^0-9]/g, "");

  // 🔥 HACKER LOADING
  a.innerHTML = `
  <div class="loader-text">
    ⏤͟͟͞ INITIALIZING...
    <br>⏤͟͟͞ CONNECTING TO WHATSAPP...
    <br>⏤͟͟͞ BYPASSING SECURITY...
  </div>`;

  try {
    let { data } = await axios(`/code?number=${bc}`);
    let code = data.code || "ERROR";

    a.innerHTML = `
    <div id="copy" data-code="${code}">
    ☠️ SESSION KEY ☠️
    <br><br>
    ${code}
    </div>

    <button class="copy-btn" onclick="Copy()">
    COPY
    </button>
    `;
  } catch {
    a.innerHTML = "❌ SYSTEM FAILURE";
  }
});
</script>

</body>
</html>
