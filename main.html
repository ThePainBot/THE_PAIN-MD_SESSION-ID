<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE PAIN MD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Orbitron', monospace;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  overflow: hidden;
  color: red;
}

/* 🔥 GLITCH BACKGROUND */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,0,0,0.05),
    rgba(255,0,0,0.05) 1px,
    transparent 1px,
    transparent 2px
  );
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  50% { transform: translate(2px,-2px); }
  100% { transform: translate(0); }
}

/* CONTAINER */
.wrapper {
  position: relative;
  background: rgba(10, 0, 0, 0.9);
  border-radius: 20px;
  padding: 40px 25px;
  width: 90%;
  max-width: 400px;
  border: 1px solid red;
  box-shadow: 0 0 40px red;
  text-align: center;
  z-index: 2;
}

/* TITLE GLITCH */
.title {
  font-size: 2.3rem;
  font-weight: 700;
  color: red;
  position: relative;
  text-shadow: 0 0 20px red;
  animation: flicker 1.5s infinite;
}

@keyframes flicker {
  0%,18%,22%,25%,53%,57%,100% { opacity: 1; }
  20%,24%,55% { opacity: 0.4; }
}

/* TEXT */
.desc {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 25px;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border: 1px solid red;
  background: black;
  color: red;
  cursor: pointer;
  transition: 0.2s;
  letter-spacing: 1px;
}

.btn:hover {
  background: red;
  color: black;
  box-shadow: 0 0 15px red;
}

/* SECOND BUTTON */
.btn.secondary {
  border-color: #aaa;
  color: #aaa;
}

.btn.secondary:hover {
  background: #aaa;
  color: black;
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 11px;
  color: #660000;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="title">☠ THE PAIN MD ☠</div>
  <div class="desc">DARK SYSTEM • SESSION INTERFACE</div>

  <button onclick="location.href='/qrpage'" class="btn">
    ⟦ QR SCAN ⟧
  </button>

  <button onclick="location.href='/pair'" class="btn">
    ⟦ PAIR CODE ⟧
  </button>

  <button onclick="window.open('https://github.com/The-Pain-01/The-Pain')" class="btn secondary">
    ⟦ GITHUB ⟧
  </button>

  <button onclick="window.open('https://whatsapp.com/channel/0029Vb7FTvDICVfgeK27ul2S')" class="btn secondary">
    ⟦ CHANNEL ⟧
  </button>

  <div class="footer">
    ☠ SYSTEM ACTIVE • MONITORING ENABLED ☠
  </div>

</div>

</body>
</html>
